<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Muchie</title>
  <style>
    :root{
      --bg:#0b0b10;
      --panel:#12121a;
      --panel2:#0f0f18;
      --stroke:#242437;
      --stroke2:#2a2a40;

      --purple:#7c3aed;
      --purple2:#a78bfa;

      --me:#2a1f3a;
      --meStroke:#3a2a55;

      --ai:#151524;
      --aiStroke:#25253d;

      --text:#eaeaf2;
      --muted:#a9a9c0;

      --r-lg:18px;
      --r-md:14px;
      --shadow: 0 12px 30px rgba(0,0,0,.35);
    }

    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
      background:
        radial-gradient(900px 400px at 20% -10%, rgba(124,58,237,.18), transparent 60%),
        radial-gradient(700px 380px at 90% 0%, rgba(167,139,250,.10), transparent 55%),
        var(--bg);
      color:var(--text);
    }

    .wrap{max-width:920px;margin:0 auto;padding:16px}

    /* App shell */
    .shell{
      border:1px solid var(--stroke);
      background:linear-gradient(180deg, rgba(18,18,26,.96), rgba(15,15,24,.92));
      border-radius:22px;
      overflow:hidden;
      box-shadow:var(--shadow);
      backdrop-filter: blur(10px);
    }

    /* Header */
    .top{
      position:sticky; top:0; z-index:5;
      display:flex; align-items:center; justify-content:space-between;
      gap:12px;
      padding:14px 16px;
      border-bottom:1px solid rgba(36,36,55,.9);
      background:
        linear-gradient(180deg, rgba(18,18,26,.96), rgba(18,18,26,.85));
      backdrop-filter: blur(10px);
    }

    .brand{
      display:flex; align-items:center; gap:12px; min-width:0;
    }

    .avatar{
      width:44px;height:44px;border-radius:14px;
      border:1px solid var(--stroke2);
      background:var(--panel2);
      object-fit:cover;
      box-shadow:0 6px 18px rgba(0,0,0,.35);
    }

    .titleWrap{display:flex; flex-direction:column; line-height:1.05; min-width:0;}
    .title{
      display:flex; align-items:center; gap:8px;
      font-weight:700;
      letter-spacing:.2px;
      font-size:16px;
      margin:0;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }
    .subtitle{
      margin:2px 0 0;
      color:var(--muted);
      font-size:12px;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .badge{
      font-size:12px;
      color:rgba(234,234,242,.92);
      padding:6px 10px;
      border-radius:999px;
      border:1px solid rgba(124,58,237,.35);
      background:rgba(124,58,237,.12);
      box-shadow:0 0 0 4px rgba(124,58,237,.08);
      user-select:none;
      white-space:nowrap;
    }

    /* Log area */
    #log{
      padding:14px 14px 120px; /* space for composer */
      min-height:60vh;
      max-height:72vh;
      overflow:auto;
      scroll-behavior:smooth;
    }

    /* nice scrollbar */
    #log::-webkit-scrollbar{width:10px}
    #log::-webkit-scrollbar-thumb{
      background:rgba(167,139,250,.18);
      border:2px solid rgba(0,0,0,0);
      background-clip:padding-box;
      border-radius:999px;
    }

    /* Messages */
    .m{display:flex; gap:10px; align-items:flex-end; margin:10px 0}
    .me{justify-content:flex-end}
    .ai{justify-content:flex-start}

    .bubble{
      padding:11px 12px;
      border-radius:14px;
      max-width:min(72%, 560px);
      border:1px solid var(--aiStroke);
      background:
        linear-gradient(180deg, rgba(21,21,36,.95), rgba(21,21,36,.88));
      white-space:pre-wrap;
      line-height:1.35;
      font-size:14px;
      box-shadow:0 10px 22px rgba(0,0,0,.22);
    }

    .me .bubble{
      background:
        linear-gradient(180deg, rgba(42,31,58,.95), rgba(42,31,58,.86));
      border:1px solid var(--meStroke);
    }

    .msgAvatar{
      width:30px;height:30px;border-radius:10px;
      border:1px solid var(--stroke2);
      background:var(--panel2);
      object-fit:cover;
      flex:0 0 auto;
      box-shadow:0 6px 16px rgba(0,0,0,.22);
    }

    /* little tails */
    .ai .bubble{border-top-left-radius:10px}
    .me .bubble{border-top-right-radius:10px}

    /* Composer */
    .composer{
      position:sticky; bottom:0; z-index:5;
      padding:12px 12px 14px;
      border-top:1px solid rgba(36,36,55,.85);
      background:
        linear-gradient(180deg, rgba(18,18,26,.20), rgba(18,18,26,.96) 35%, rgba(18,18,26,.98));
      backdrop-filter: blur(10px);
    }

    form{
      display:flex;
      gap:10px;
      align-items:center;
      padding:10px;
      border-radius:16px;
      border:1px solid rgba(42,42,64,.9);
      background:rgba(15,15,24,.9);
      box-shadow:0 10px 25px rgba(0,0,0,.25);
    }

    input{
      flex:1;
      padding:12px 12px;
      border-radius:12px;
      border:1px solid rgba(42,42,64,.2);
      outline:none;
      background:transparent;
      color:#fff;
      font-size:14px;
      min-width:0;
    }
    input::placeholder{color:rgba(169,169,192,.75)}

    button{
      padding:11px 14px;
      border-radius:12px;
      border:1px solid rgba(124,58,237,.35);
      background:
        linear-gradient(180deg, rgba(124,58,237,.20), rgba(124,58,237,.12));
      color:#fff;
      font-weight:650;
      letter-spacing:.2px;
      cursor:pointer;
      transition:transform .08s ease, filter .15s ease, background .15s ease;
      white-space:nowrap;
    }
    button:hover{filter:brightness(1.08)}
    button:active{transform:translateY(1px)}
    button:disabled{opacity:.55; cursor:not-allowed}

    /* Typing shimmer */
    .typing{
      position:relative;
      overflow:hidden;
      color:rgba(234,234,242,.85);
    }
    .typing::after{
      content:"";
      position:absolute; inset:0;
      transform:translateX(-120%);
      background:linear-gradient(90deg, transparent, rgba(167,139,250,.12), transparent);
      animation:shimmer 1.1s infinite;
    }
    @keyframes shimmer{
      0%{transform:translateX(-120%)}
      100%{transform:translateX(120%)}
    }

    /* Mobile */
    @media (max-width:520px){
      .wrap{padding:10px}
      #log{max-height:72vh}
      .bubble{max-width:82%}
      .badge{display:none}
    }
  </style>
</head>

<body>
  <div class="wrap">
    <div class="shell">
      <div class="top">
        <div class="brand">
          <img id="muchieAvatar" class="avatar" src="images/muchie.png" alt="Muchie" />
          <div class="titleWrap">
            <h2 class="title">Muchie 🟣</h2>
            <div class="subtitle">Your space pet</div>
          </div>
        </div>
        <div class="badge">Local chat + Outfit sync</div>
      </div>

      <div id="log"></div>

      <div class="composer">
        <form id="f" autocomplete="off">
          <input id="t" placeholder="Say hi…" />
          <button type="submit">Send</button>
        </form>
      </div>
    </div>
  </div>

<script>
  const log = document.querySelector("#log");
  const input = document.querySelector("#t");
  const form = document.querySelector("#f");
  const btn = form.querySelector("button");

  console.log("Muchie chat loaded ✅");

  const CHAT_KEY = "purpz_muchie_chat_v1";

  const loadHistory = () => {
    try {
      const v = JSON.parse(localStorage.getItem(CHAT_KEY) || "[]");
      return Array.isArray(v) ? v : [];
    } catch {
      return [];
    }
  };
  const saveHistory = (arr) => localStorage.setItem(CHAT_KEY, JSON.stringify(arr));

  const TYCOON_KEY = "purpz_muchie_tycoon_v1";
  const avatarEl = document.querySelector("#muchieAvatar");

  const OUTFIT_TO_IMG = {
    base: "images/muchie.png",
    tech: "images/muchie_tech.png",
    galaxy: "images/muchie_galaxy.png",
    mechanic: "images/muchie_mechanic.png",
    cozy: "images/muchie_cozy.png",
  };
    
    function updateMessageAvatar(imgEl){
  const topAvatar = document.querySelector("#muchieAvatar");
  if (!topAvatar || !imgEl) return;
  imgEl.src = topAvatar.src;
}

function syncAllMessageAvatars(){
  document.querySelectorAll('#log img.msgAvatar[data-avatar="muchie"]')
    .forEach(updateMessageAvatar);
}

function updateMuchieAvatar(){
  let outfit = "base";

  try {
    const raw = localStorage.getItem(TYCOON_KEY);
    if (raw) {
      const tycoon = JSON.parse(raw);
      outfit = tycoon?.equippedOutfit || "base";
    }
  } catch {}

  const img = OUTFIT_TO_IMG[outfit] || OUTFIT_TO_IMG.base;

  if (avatarEl) {
    avatarEl.src = img;
    avatarEl.title = `Outfit: ${outfit}`;
  }

  // ✅ update all existing chat avatars too
  syncAllMessageAvatars();
}

  updateMuchieAvatar();

  window.addEventListener("storage", (e) => {
    if (e.key === TYCOON_KEY) updateMuchieAvatar();
  });

  let history = loadHistory();

  function add(role, text){
    const row = document.createElement("div");
    row.className = "m " + role;

    const bubble = document.createElement("div");
    bubble.className = "bubble";
    bubble.textContent = text;

    if (role === "ai") {
      const av = document.createElement("img");
      av.className = "msgAvatar";
      av.alt = "Muchie";
      av.dataset.avatar = "muchie";
updateMessageAvatar(av);
      row.appendChild(av);
      row.appendChild(bubble);
    } else {
      row.appendChild(bubble);
    }

    log.appendChild(row);
    log.scrollTop = log.scrollHeight;
    return row;
  }

  add("ai", "Chat loaded ✅");

  if (history.length) {
    for (const m of history) add(m.role === "user" ? "me" : "ai", m.content);
  } else {
    add("ai","Hi! I’m Muchie 🟣");
    history.push({ role:"assistant", content:"hmm.. is Big Lily here?" });
    saveHistory(history);
  }

  btn.addEventListener("click", (e) => {
    e.preventDefault();
    form.dispatchEvent(new Event("submit", { cancelable: true }));
  });

  form.addEventListener("submit", async (e)=>{
    e.preventDefault();

    const msg = (input.value || "").trim();
    console.log("Submit fired. msg=", msg);

    if(!msg) return;

    input.value = "";
    add("me", msg);

    history.push({ role:"user", content: msg });
    history = history.slice(-20);
    saveHistory(history);

    const typing = add("ai", "…typing");
    typing.querySelector?.(".bubble")?.classList?.add?.("typing"); // safe no-op
    // If querySelector doesn't exist (it does), this won't crash.

    let tycoon = null;
    try { tycoon = JSON.parse(localStorage.getItem("purpz_muchie_tycoon_v1") || "null"); }
    catch { tycoon = null; }

    try {
      const res = await fetch("https://purpz-muchie-proxy.vercel.app/api/muchie", {
        method:"POST",
        headers:{ "Content-Type":"application/json" },
        body: JSON.stringify({
          message: msg,
          history: history.slice(-12),
          tycoon
        })
      });

      const raw = await res.text();
      console.log("API status:", res.status, "raw:", raw.slice(0,200));

      let data;
      try { data = JSON.parse(raw); }
      catch {
        typing.textContent = "Server returned non-JSON: " + raw.slice(0,200);
        return;
      }

      if(!res.ok){
        typing.textContent = "Error: " + (data.error || "Request failed");
        return;
      }

      const reply = data.reply || "(no reply)";
      const bubble = typing.querySelector(".bubble");
if (bubble) {
  bubble.textContent = reply;
}

      history.push({ role:"assistant", content: reply });
      history = history.slice(-20);
      saveHistory(history);

    } catch (err) {
      console.error(err);
      typing.textContent = "Oops — I couldn’t connect. Try again.";
    }
  });
    function updateMessageAvatar(imgEl){
  const topAvatar = document.querySelector("#muchieAvatar");
  if (!topAvatar) return;
  imgEl.src = topAvatar.src;
}
</script>
</body>
</html>
