
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Diagonal Diary</title>
  <style>

    :root{
  --bg:#0b0620;                /* deeper purple base */
  --panel:#140b2e;             /* purple panel */
  --panel2:#1b0f3a;            /* slightly brighter purple */
  --ink:#f5f0ff;
  --muted:#d6c9ff;
  --line:rgba(255,255,255,.09);

  --accent:#a855f7;            /* violet */
  --accent2:#7c3aed;           /* purple */
  --accent3:#ec4899;           /* pink highlight */
  --danger:#ff5b7a;

  --shadow: 0 20px 50px rgba(0,0,0,.50);
  --radius: 18px;
} 

    *{box-sizing:border-box}
    body{
  margin:0;
  font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
  background:
    radial-gradient(1100px 700px at 12% 12%, rgba(168,85,247,.35), transparent 60%),
    radial-gradient(1000px 700px at 90% 18%, rgba(124,58,237,.25), transparent 58%),
    radial-gradient(900px 700px at 55% 115%, rgba(236,72,153,.14), transparent 55%),
    linear-gradient(160deg, #09031a, #0b0620 40%, #12062a);
  color:var(--ink);
  min-height:100vh;
  overflow-x:hidden;
}

    /* Top bar */
    header{
      position:sticky;
      top:0;
      z-index:20;
      backdrop-filter: blur(10px);
      background: linear-gradient(to bottom, rgba(15,18,32,.85), rgba(15,18,32,.55));
      border-bottom:1px solid var(--line);
    }
    .topbar{
      max-width:1100px;
      margin:0 auto;
      padding:14px 16px;
      display:flex;
      gap:12px;
      align-items:center;
      justify-content:space-between;
    }
    ..brand{
  display:flex;
  align-items:center;
  gap:18px;
  letter-spacing:.28em;
  text-transform: uppercase;
  background: #fff;
        color: black;
}

/* first word inside a white rectangle */
.brand > div{
  background: var(--tag-bg);
  color: var(--tag-ink);
  padding: 5px 13px;
  border-radius: 0;      /* sharp corners like screenshot */
  font-weight: 800;
  letter-spacing: .28em;
  font-size: 18px;
    background-color: #fff;
    color: black;
}

/* second word to the right (SPACE) */
.brand small{
  background: transparent !important;
  color: var(--ink) !important;
  font-weight: 700;
  font-size: 16px;
  letter-spacing: .38em;
  opacity: .95;
  margin-left: 2px;
}

    .actions{
      display:flex;
      gap:10px;
      align-items:center;
    }
    .chip{
      display:flex;
      gap:8px;
      align-items:center;
      background:rgba(255,255,255,.06);
      border:1px solid var(--line);
      padding:10px 12px;
      border-radius:999px;
      color:var(--muted);
    }
    .chip input{
      background:transparent;
      border:0;
      outline:none;
      color:var(--ink);
      width:180px;
      font-size:14px;
    }
    .btn{
      border:1px solid var(--line);
      background:rgba(255,255,255,.06);
      color:var(--ink);
      padding:10px 12px;
      border-radius:999px;
      cursor:pointer;
      transition:transform .12s ease, background .12s ease;
      user-select:none;
      font-weight:600;
    }
    .btn:hover{background:rgba(255,255,255,.09)}
    .btn:active{transform:scale(.98)}
    .btn.primary{
  background: linear-gradient(135deg, rgba(124,58,237,.95), rgba(168,85,247,.92));
  border-color: rgba(255,255,255,.16);
  color:#0b061a;
}

    /* Main layout */
    .wrap{
      max-width:1100px;
      margin:0 auto;
      padding:18px 16px 110px;
    }

    .stage{
      position:relative;
      display:grid;
      grid-template-columns: 360px 1fr;
      gap:16px;
      align-items:stretch;
    }

    /* Diagonal divider effect */
    .stage::before{
      content:"";
      position:absolute;
      inset:-40px -30px -40px -30px;
      background:
        linear-gradient(125deg, transparent 0 42%, rgba(255,255,255,.06) 42% 43.2%, transparent 43.2% 100%);
      pointer-events:none;
      opacity:.9;
    }

    .panel{
      position:relative;
      background: linear-gradient(180deg, rgba(23,27,46,.92), rgba(23,27,46,.75));
      border:1px solid var(--line);
      border-radius:var(--radius);
      box-shadow: var(--shadow);
      overflow:hidden;
    }

    /* Left: timeline */
    .timeline{
      padding:14px;
      display:flex;
      flex-direction:column;
      min-height:520px;
    }
    .timeline h2{
      margin:6px 4px 10px;
      font-size:16px;
      letter-spacing:.12em;
      text-transform:uppercase;
      color:var(--muted);
    }

    .dateRail{
      display:grid;
      grid-template-columns: 52px 1fr;
      gap:12px;
      align-items:start;
      height:100%;
      overflow:hidden;
    }
    .rail{
      position:sticky;
      top:72px;
      align-self:start;
      border-right:1px dashed rgba(255,255,255,.12);
      padding-right:10px;
      height:calc(100vh - 140px);
      min-height:420px;
      overflow:auto;
      scrollbar-width: thin;
    }
    .rail::-webkit-scrollbar{width:8px}
    .rail::-webkit-scrollbar-thumb{background:rgba(255,255,255,.10); border-radius:999px}

    .rail .pill{
      width:42px;
      margin:6px auto;
      padding:10px 0;
      text-align:center;
      border-radius:999px;
      border:1px solid rgba(255,255,255,.10);
      background:rgba(255,255,255,.04);
      color:var(--muted);
      cursor:pointer;
      font-weight:700;
      transition:transform .12s ease, background .12s ease, border-color .12s ease;
      user-select:none;
    }
    .rail .pill:hover{background:rgba(255,255,255,.07)}
    .rail .pill.active{
  background:rgba(168,85,247,.22);
  border-color: rgba(168,85,247,.55);
  color:var(--ink);
  transform:translateX(2px);
}

.entryCard:hover{
  transform:translateY(-1px);
  border-color: rgba(168,85,247,.45);
  background: linear-gradient(180deg, rgba(27,15,58,.78), rgba(27,15,58,.52));
}

.entryCard.active{
  border-color: rgba(124,58,237,.70);
  background: linear-gradient(180deg, rgba(124,58,237,.16), rgba(27,15,58,.52));
}

    .entries{
      overflow:auto;
      height:calc(100vh - 140px);
      min-height:420px;
      padding-right:4px;
      scrollbar-width: thin;
    }
    .entries::-webkit-scrollbar{width:8px}
    .entries::-webkit-scrollbar-thumb{background:rgba(255,255,255,.10); border-radius:999px}

    
    .entryTop{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      margin-bottom:6px;
    }
    .entryTop .stamp{
      font-size:12px;
      color:var(--muted);
      letter-spacing:.08em;
      text-transform:uppercase;
    }
    .tag{
      font-size:12px;
      padding:4px 10px;
      border-radius:999px;
      border:1px solid rgba(255,255,255,.10);
      background:rgba(255,255,255,.05);
      color:var(--muted);
      white-space:nowrap;
    }
    .entryTitle{
      font-weight:800;
      margin:0 0 6px;
      font-size:14.5px;
    }
    .entryPreview{
      margin:0;
      color:rgba(238,240,255,.78);
      font-size:13.5px;
      line-height:1.35;
      display:-webkit-box;
      -webkit-line-clamp:3;
      -webkit-box-orient:vertical;
      overflow:hidden;
    }

    /* Right: editor */
    .editor{
      padding:14px;
      min-height:520px;
      display:flex;
      flex-direction:column;
    }
    .editorHeader{
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      gap:12px;
      padding:6px 6px 10px;
      border-bottom:1px solid var(--line);
    }
    .editorHeader h1{
      margin:0;
      font-size:26px;
      letter-spacing:.2px;
    }
    .editorHeader .meta{
      margin-top:6px;
      color:var(--muted);
      font-size:13px;
    }

    .form{
      display:grid;
      grid-template-columns: 1.2fr .8fr;
      gap:12px;
      padding:12px 6px;
    }
    .field{
      display:flex;
      flex-direction:column;
      gap:7px;
    }
    label{
      font-size:12px;
      color:var(--muted);
      letter-spacing:.16em;
      text-transform:uppercase;
    }
    input[type="text"], input[type="date"], select, textarea{
      width:100%;
      border-radius:14px;
      border:1px solid rgba(255,255,255,.12);
      background:rgba(255,255,255,.05);
      color:var(--ink);
      padding:12px 12px;
      outline:none;
      font-size:14px;
    }
    textarea{
      min-height:300px;
      resize:vertical;
      line-height:1.45;
      padding:12px 12px;
    }

    .editorFooter{
      margin-top:auto;
      padding:12px 6px 6px;
      border-top:1px solid var(--line);
      display:flex;
      justify-content:space-between;
      gap:10px;
      flex-wrap:wrap;
      align-items:center;
    }
    .hint{
      color:var(--muted);
      font-size:13px;
    }
    .btnRow{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      align-items:center;
    }
    .btn.danger{
      background: rgba(255,91,122,.10);
      border-color: rgba(255,91,122,.35);
      color: var(--ink);
    }

    /* Mobile: bottom sheet editor */
    .sheetBack{
      position:fixed;
      inset:0;
      background:rgba(0,0,0,.55);
      opacity:0;
      pointer-events:none;
      transition:opacity .18s ease;
      z-index:40;
    }
    .sheetBack.open{
      opacity:1;
      pointer-events:auto;
    }
    .sheet{
      position:fixed;
      left:0;
      right:0;
      bottom:-100%;
      background: linear-gradient(180deg, rgba(23,27,46,.96), rgba(23,27,46,.90));
      border-top:1px solid rgba(255,255,255,.12);
      border-radius: 22px 22px 0 0;
      box-shadow: 0 -25px 60px rgba(0,0,0,.55);
      z-index:50;
      transition:bottom .22s ease;
      max-height: 92vh;
      overflow:auto;
    }
    .sheet.open{ bottom:0; }
    .sheetHandle{
      width:58px;
      height:5px;
      border-radius:999px;
      background:rgba(255,255,255,.18);
      margin:10px auto 0;
    }
    .sheetContent{
      padding:10px 14px 18px;
    }
    .mobileOnly{ display:none; }

    /* Responsiveness */
    @media (max-width: 900px){
      .stage{ grid-template-columns: 1fr; }
      .stage::before{ opacity:.4; }
      .editor{ display:none; } /* move editor into sheet on mobile */
      .mobileOnly{ display:inline-flex; }
      .rail{ top:66px; height:auto; min-height:unset; max-height:230px; }
      .entries{ height:auto; min-height:unset; max-height: calc(100vh - 340px); }
      .dateRail{ grid-template-columns: 58px 1fr; }
      .timeline{ min-height:unset; }
    }

    /* Tiny screens */
    @media (max-width: 420px){
      .chip input{ width:130px; }
    }
      textarea {
  background:
    linear-gradient(rgba(20, 10, 40, 0.85), rgba(20, 10, 40, 0.85));

  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;

  color: #f5f0ff;
}
  </style>
</head>
<body>
  <header>
    <div class="topbar">
      <div class="brand">
        <div style="font-size:18px;">PURPZ</div>
        <small>Diary</small>
      </div>

      <div class="actions">
        <div class="chip" title="Search title or text">
          <span aria-hidden="true">⌕</span>
          <input id="search" placeholder="Search..." />
        </div>
        <button class="btn primary" id="newBtn">New</button>
        <button class="btn mobileOnly" id="openEditorBtn" style="display:none">Edit</button>
      </div>
    </div>
  </header>

  <main class="wrap">
    <section class="stage">
      <!-- Left panel: timeline -->
      <aside class="panel timeline">
        <h2>Timeline</h2>

        <div class="dateRail">
          <div class="rail" id="rail"></div>
          <div class="entries" id="entries"></div>
        </div>
      </aside>

      <!-- Right panel: editor (desktop/tablet) -->
      <section class="panel editor" aria-label="Editor">
        <div class="editorHeader">
          <div>
            <h1 id="editorTitle">Write something</h1>
            <div class="meta" id="editorMeta">Select an entry from the left, or create a new one.</div>
          </div>
          <div class="tag" id="activeIdTag">No entry</div>
        </div>

        <div class="form">
          <div class="field">
            <label for="title">Title</label>
            <input id="title" type="text" placeholder="e.g., Today’s small win" />
          </div>

          <div class="field">
            <label for="mood">Mood</label>
            <select id="mood">
              <option value="Calm">Calm</option>
              <option value="Happy">Happy</option>
              <option value="Focused">Focused</option>
              <option value="Grateful">Grateful</option>
              <option value="Tired">Tired</option>
              <option value="Stressed">Stressed</option>
            </select>
          </div>

          <div class="field">
            <label for="date">Date</label>
            <input id="date" type="date" />
          </div>

          <div class="field">
            <label for="labels">Labels</label>
            <input id="labels" type="text" placeholder="comma separated (work, life, goals)" />
          </div>

          <div class="field" style="grid-column: 1 / -1;">
            <label for="body">Entry</label>
            <textarea id="body" placeholder="Write here..."></textarea>
          </div>
        </div>

        <div class="editorFooter">
          <div class="hint" id="statusHint">Autosaves when you click Save.</div>
          <div class="btnRow">
            <button class="btn" id="saveBtn">Save</button>
            <button class="btn danger" id="deleteBtn">Delete</button>
          </div>
        </div>
      </section>
    </section>
  </main>

  <!-- Mobile bottom sheet -->
  <div class="sheetBack" id="sheetBack" aria-hidden="true"></div>
  <div class="sheet" id="sheet" role="dialog" aria-modal="true" aria-label="Diary editor">
    <div class="sheetHandle"></div>
    <div class="sheetContent">
      <div style="display:flex; align-items:flex-start; justify-content:space-between; gap:10px; padding:8px 2px 10px; border-bottom:1px solid var(--line);">
        <div>
          <div style="font-weight:800; font-size:18px;" id="mEditorTitle">Edit entry</div>
          <div style="color:var(--muted); font-size:13px;" id="mEditorMeta">Make changes and tap Save.</div>
        </div>
        <button class="btn" id="closeSheetBtn">Close</button>
      </div>

      <div class="form" style="grid-template-columns: 1fr; padding:12px 2px;">
        <div class="field">
          <label for="m_title">Title</label>
          <input id="m_title" type="text" placeholder="e.g., Today’s small win" />
        </div>

        <div class="field" style="display:grid; grid-template-columns:1fr 1fr; gap:12px;">
          <div class="field">
            <label for="m_date">Date</label>
            <input id="m_date" type="date" />
          </div>
          <div class="field">
            <label for="m_mood">Mood</label>
            <select id="m_mood">
              <option value="Calm">Calm</option>
              <option value="Happy">Happy</option>
              <option value="Focused">Focused</option>
              <option value="Grateful">Grateful</option>
              <option value="Tired">Tired</option>
              <option value="Stressed">Stressed</option>
            </select>
          </div>
        </div>

        <div class="field">
          <label for="m_labels">Labels</label>
          <input id="m_labels" type="text" placeholder="comma separated (work, life, goals)" />
        </div>

        <div class="field">
          <label for="m_body">Entry</label>
          <textarea id="m_body" style="min-height:220px" placeholder="I feel so..."></textarea>
        </div>

        <div style="display:flex; gap:10px; flex-wrap:wrap; justify-content:flex-end; padding-top:6px;">
          <button class="btn danger" id="m_deleteBtn">Delete</button>
          <button class="btn primary" id="m_saveBtn">Save</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    // ===== PURPZ DIARY (MySQL via InfinityFree PHP API) =====

// ---------- Helpers ----------
const $ = (sel) => document.querySelector(sel);

const escapeHtml = (s) => (s || "")
  .replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;")
  .replaceAll('"',"&quot;").replaceAll("'","&#039;");

const todayISO = () => {
  const d = new Date();
  const tz = d.getTimezoneOffset() * 60000;
  return new Date(Date.now() - tz).toISOString().slice(0,10);
};

const id = () => Math.random().toString(16).slice(2) + "-" + Date.now().toString(16);

// ---------- API (PHP on InfinityFree) ----------
const API_BASE = "./api"; // change to "../api" if your index.html is inside a subfolder

async function apiList(q = "") {
  const url = q
    ? `${API_BASE}/entries_list.php?q=${encodeURIComponent(q)}`
    : `${API_BASE}/entries_list.php`;
  const res = await fetch(url, { cache: "no-store" });
  if (!res.ok) throw new Error("Failed to load entries");
  return await res.json();
}

async function apiSave(entry) {
  const res = await fetch(`${API_BASE}/entry_save.php`, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(entry),
  });
  if (!res.ok) throw new Error("Failed to save entry");
  return await res.json();
}

async function apiDelete(entryId) {
  const res = await fetch(`${API_BASE}/entry_delete.php`, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ id: entryId }),
  });
  if (!res.ok) throw new Error("Failed to delete entry");
  return await res.json();
}

// ---------- Group entries by month (YYYY-MM) ----------
function monthKey(dateISO){
  return (dateISO || todayISO()).slice(0,7);
}

function monthLabel(yyyyMM){
  const [y,m] = yyyyMM.split("-");
  const dt = new Date(Number(y), Number(m)-1, 1);
  return dt.toLocaleString(undefined, { month:"short", year:"2-digit" }).toUpperCase();
}

// ---------- State ----------
let entries = [];
let activeId = null;
let activeMonth = monthKey(todayISO());
let searchTerm = "";

// ---------- DOM refs (desktop) ----------
const railEl = $("#rail");
const entriesEl = $("#entries");

const titleEl = $("#title");
const dateEl  = $("#date");
const moodEl  = $("#mood");
const labelsEl= $("#labels");
const bodyEl  = $("#body");

const editorTitle = $("#editorTitle");
const editorMeta  = $("#editorMeta");
const activeIdTag = $("#activeIdTag");
const statusHint  = $("#statusHint");

// ---------- Mobile sheet refs ----------
const sheet = $("#sheet");
const sheetBack = $("#sheetBack");

const m_title = $("#m_title");
const m_date  = $("#m_date");
const m_mood  = $("#m_mood");
const m_labels= $("#m_labels");
const m_body  = $("#m_body");

const mEditorTitle = $("#mEditorTitle");
const mEditorMeta  = $("#mEditorMeta");

// ---------- Rendering helpers ----------
function sortedEntries(arr){
  return arr.slice().sort((a,b) => {
    const ad = (a.date || "");
    const bd = (b.date || "");
    if(ad !== bd) return bd.localeCompare(ad);
    return (b.updated_at || b.updatedAt || 0) - (a.updated_at || a.updatedAt || 0);
  });
}

function monthsFrom(arr){
  const set = new Set(arr.map(e => monthKey(e.date)));
  return Array.from(set).sort((a,b) => b.localeCompare(a));
}

function getActive(){
  return entries.find(e => e.id === activeId) || null;
}

// Make sure we handle DB field name updated_at
function getUpdatedAt(e){
  return e.updated_at ?? e.updatedAt ?? Date.now();
}

// ---------- Render UI ----------
function renderRail(){
  const arr = sortedEntries(entries);
  const months = monthsFrom(arr);

  if(months.length && !months.includes(activeMonth)){
    activeMonth = months[0];
  }
  if(!months.length){
    activeMonth = monthKey(todayISO());
  }

  railEl.innerHTML = months.map(m => {
    const active = m === activeMonth ? "active" : "";
    return `<div class="pill ${active}" data-month="${m}" title="${m}">${monthLabel(m)}</div>`;
  }).join("");
}

function renderEntryList(){
  const arr = sortedEntries(entries).filter(e => monthKey(e.date) === activeMonth);

  if(arr.length === 0){
    entriesEl.innerHTML = `
      <div style="padding:14px 10px; color:var(--muted);">
        No entries here yet.<br/>
        Tap <b>New</b> to write one.
      </div>`;
    return;
  }

  entriesEl.innerHTML = arr.map(e => {
    const active = e.id === activeId ? "active" : "";
    const stamp = new Date(e.date + "T00:00:00").toLocaleDateString(undefined, {
      weekday:"short", month:"short", day:"2-digit"
    });

    const tag = escapeHtml(e.mood || "—");
    const title = escapeHtml(e.title || "(Untitled)");
    const preview = escapeHtml((e.body || "").trim() || "…");

    const labels = (e.labels || "").split(",").map(s => s.trim()).filter(Boolean);
    const labelTag = labels[0] ? `<span class="tag">${escapeHtml(labels[0])}</span>` : `<span class="tag">No label</span>`;

    return `
      <div class="entryCard ${active}" data-id="${e.id}">
        <div class="entryTop">
          <div class="stamp">${escapeHtml(stamp)}</div>
          <div style="display:flex; gap:8px; align-items:center;">
            ${labelTag}
            <span class="tag mood">${tag}</span>
          </div>
        </div>
        <p class="entryTitle">${title}</p>
        <p class="entryPreview">${preview}</p>
      </div>
    `;
  }).join("");
}

function fillEditorFrom(entry){
  if(!entry){
    editorTitle.textContent = "Write something";
    editorMeta.textContent = "Select an entry from the left, or create a new one.";
    activeIdTag.textContent = "No entry";
    titleEl.value = "";
    dateEl.value = todayISO();
    moodEl.value = "Calm";
    labelsEl.value = "";
    bodyEl.value = "";
    return;
  }

  editorTitle.textContent = entry.title?.trim() ? "Editing" : "Untitled entry";
  editorMeta.textContent = `Last updated: ${new Date(getUpdatedAt(entry)).toLocaleString()}`;
  activeIdTag.textContent = entry.id.slice(0, 8);

  titleEl.value = entry.title || "";
  dateEl.value  = entry.date || todayISO();
  moodEl.value  = entry.mood || "Calm";
  labelsEl.value= entry.labels || "";
  bodyEl.value  = entry.body || "";
}

function fillMobileEditorFrom(entry){
  if(!entry) return;
  mEditorTitle.textContent = (entry.title || "Untitled").slice(0, 40);
  mEditorMeta.textContent  = `ID: ${entry.id.slice(0, 8)} • Updated: ${new Date(getUpdatedAt(entry)).toLocaleString()}`;

  m_title.value = entry.title || "";
  m_date.value  = entry.date || todayISO();
  m_mood.value  = entry.mood || "Calm";
  m_labels.value= entry.labels || "";
  m_body.value  = entry.body || "";
}

function rerenderAll(){
  renderRail();
  renderEntryList();
  fillEditorFrom(getActive());
}

// ---------- Actions ----------
function setActive(idVal){
  activeId = idVal;
  const e = getActive();
  activeMonth = monthKey(e?.date || todayISO());
  rerenderAll();
}

// Update active entry from editor
function updateActiveFromDesktop(){
  const e = getActive();
  if(!e) return null;

  e.title = titleEl.value;
  e.date  = dateEl.value || todayISO();
  e.mood  = moodEl.value;
  e.labels= labelsEl.value;
  e.body  = bodyEl.value;
  e.updated_at = Date.now(); // keep DB naming
  return e;
}

function updateActiveFromMobile(){
  const e = getActive();
  if(!e) return null;

  e.title = m_title.value;
  e.date  = m_date.value || todayISO();
  e.mood  = m_mood.value;
  e.labels= m_labels.value;
  e.body  = m_body.value;
  e.updated_at = Date.now();
  return e;
}

async function newEntry(){
  const e = {
    id: id(),
    title: "",
    date: todayISO(),
    mood: "Calm",
    labels: "",
    body: "",
    updatedAt: Date.now()
  };

  await apiSave(e);
  entries = await apiList(searchTerm);

  setActive(e.id);

  if(window.matchMedia("(max-width: 900px)").matches){
    openSheet();
    fillMobileEditorFrom(getActive());
  }
  statusHint.textContent = "New entry created.";
}

async function saveCurrent(fromMobile=false){
  const e = fromMobile ? updateActiveFromMobile() : updateActiveFromDesktop();
  if(!e) return;

  await apiSave({
    id: e.id,
    title: e.title,
    date: e.date,
    mood: e.mood,
    labels: e.labels,
    body: e.body,
    updatedAt: e.updated_at ?? Date.now()
  });

  entries = await apiList(searchTerm);
  activeMonth = monthKey(e.date);
  rerenderAll();

  statusHint.textContent = "Saved ✔";
  setTimeout(() => statusHint.textContent = "Autosaves when you click Save.", 1100);
}

async function deleteCurrent(){
  const e = getActive();
  if(!e) return;

  const ok = confirm("Delete this entry? This can't be undone.");
  if(!ok) return;

  await apiDelete(e.id);

  entries = await apiList(searchTerm);

  const fallback = sortedEntries(entries)[0];
  activeId = fallback?.id || null;
  activeMonth = monthKey(fallback?.date || todayISO());
  rerenderAll();

  if(window.matchMedia("(max-width: 900px)").matches){
    closeSheet();
  }
  statusHint.textContent = "Deleted.";
}

// ---------- Mobile sheet controls ----------
function openSheet(){
  sheet.classList.add("open");
  sheetBack.classList.add("open");
  sheetBack.setAttribute("aria-hidden","false");
}
function closeSheet(){
  sheet.classList.remove("open");
  sheetBack.classList.remove("open");
  sheetBack.setAttribute("aria-hidden","true");
}

// ---------- Event listeners ----------
$("#newBtn").addEventListener("click", () => newEntry());
$("#saveBtn").addEventListener("click", () => saveCurrent(false));
$("#deleteBtn").addEventListener("click", () => deleteCurrent());

railEl.addEventListener("click", (ev) => {
  const pill = ev.target.closest(".pill");
  if(!pill) return;
  activeMonth = pill.dataset.month;
  renderRail();
  renderEntryList();
});

entriesEl.addEventListener("click", (ev) => {
  const card = ev.target.closest(".entryCard");
  if(!card) return;

  setActive(card.dataset.id);

  if(window.matchMedia("(max-width: 900px)").matches){
    openSheet();
    fillMobileEditorFrom(getActive());
  }
});

$("#search").addEventListener("input", async (ev) => {
  searchTerm = ev.target.value || "";
  entries = await apiList(searchTerm);
  rerenderAll();
});

$("#openEditorBtn").addEventListener("click", () => {
  const e = getActive();
  if(!e) return;
  openSheet();
  fillMobileEditorFrom(e);
});

$("#closeSheetBtn").addEventListener("click", closeSheet);
sheetBack.addEventListener("click", closeSheet);

$("#m_saveBtn").addEventListener("click", () => saveCurrent(true));
$("#m_deleteBtn").addEventListener("click", () => deleteCurrent());

window.addEventListener("resize", () => {
  if(!window.matchMedia("(max-width: 900px)").matches){
    closeSheet();
  }
});

// ---------- Init ----------
(async function init(){
  try{
    entries = await apiList("");

    if(!entries || entries.length === 0){
      const e = {
        id: id(),
        title: "Welcome to PURPZ Diary",
        date: todayISO(),
        mood: "Calm",
        labels: "starter",
        body: "This diary is now saved in MySQL (InfinityFree) via PHP API.",
        updatedAt: Date.now()
      };
      await apiSave(e);
      entries = await apiList("");
    }

    const first = sortedEntries(entries)[0];
    if(first){
      activeId = first.id;
      activeMonth = monthKey(first.date);
    }

    rerenderAll();
  }catch(err){
    console.error(err);
    alert("API/DB error: check your /api files and db.php credentials.");
  }
})();
  </script>
    
</body>
</html>
